name: Approve Merge Handler

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  approve-merge:
    # Only run when /approve-merge is commented on a QA issue
    if: |
      contains(github.event.comment.body, '/approve-merge') &&
      startsWith(github.event.issue.title, '[QA]') &&
      github.event.issue.state == 'open'
    runs-on: ubuntu-latest

    steps:
      - name: Extract PR number from issue title
        id: parse
        run: |
          # Title format: [QA] AXA-N — Sprint N title: Review PR #N
          TITLE="${{ github.event.issue.title }}"
          PR_NUMBER=$(echo "$TITLE" | grep -oP '(?<=PR #)\d+' | head -1)
          if [[ -z "$PR_NUMBER" ]]; then
            echo "ERROR: Could not extract PR number from issue title: $TITLE"
            exit 1
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Parsed PR number: $PR_NUMBER"

      - name: Check PR is open and mergeable
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ steps.parse.outputs.pr_number }} \
            --jq '{state, mergeable, draft, head_ref: .head.ref}')
          STATE=$(echo "$PR_DATA" | jq -r '.state')
          DRAFT=$(echo "$PR_DATA" | jq -r '.draft')
          HEAD_REF=$(echo "$PR_DATA" | jq -r '.head_ref')

          if [[ "$STATE" != "open" ]]; then
            echo "PR #${{ steps.parse.outputs.pr_number }} is not open (state: $STATE)" >> "$GITHUB_STEP_SUMMARY"
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
              --method POST \
              --field body="❌ Cannot merge: PR #${{ steps.parse.outputs.pr_number }} is not open (state: $STATE)."
            exit 1
          fi

          if [[ "$DRAFT" == "true" ]]; then
            echo "PR is still a draft — converting to ready" >> "$GITHUB_STEP_SUMMARY"
            gh api repos/${{ github.repository }}/pulls/${{ steps.parse.outputs.pr_number }} \
              --method PATCH --field draft=false
          fi

          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - name: Squash merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE=$(gh api repos/${{ github.repository }}/pulls/${{ steps.parse.outputs.pr_number }} \
            --jq '.title')
          ISSUE_LINK="Closes #${{ github.event.issue.number }}"

          gh api repos/${{ github.repository }}/pulls/${{ steps.parse.outputs.pr_number }}/merge \
            --method PUT \
            --field merge_method=squash \
            --field commit_title="${PR_TITLE} [QA approved]" \
            --field commit_message="$ISSUE_LINK"

          echo "✅ Merged PR #${{ steps.parse.outputs.pr_number }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Delete source branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_REF="${{ steps.check_pr.outputs.head_ref }}"
          gh api repos/${{ github.repository }}/git/refs/heads/${HEAD_REF} \
            --method DELETE && echo "Deleted branch: $HEAD_REF" || echo "Branch already deleted or protected"

      - name: Post merge confirmation on QA issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MERGE_SHA=$(gh api repos/${{ github.repository }}/commits/main --jq '.sha' | cut -c1-7)
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            --method POST \
            --field body="✅ **Merged.** PR #${{ steps.parse.outputs.pr_number }} squash-merged to main (commit \`${MERGE_SHA}\`). Branch deleted. Closing this QA issue."

      - name: Close QA issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }} \
            --method PATCH --field state=closed
