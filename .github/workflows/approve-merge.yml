name: Approve Merge Handler

# Handles two trigger comments on QA issues:
#
#   /approve-design  (on [DesignQA] issues)
#     → merges the frontend branch immediately
#
#   /approve-merge   (on [QA] issues)
#     → checks that any linked [DesignQA] issue is already closed
#     → then merges the backend branch
#
# /request-changes / /request-design-changes → post block comment, do not merge.

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # Frontend gate: /approve-design on a [DesignQA] issue
  # ────────────────────────────────────────────────────────────────
  approve-design:
    if: |
      contains(github.event.comment.body, '/approve-design') &&
      startsWith(github.event.issue.title, '[DesignQA]') &&
      github.event.issue.state == 'open' &&
      github.event.comment.user.login == 'edupazogle'
    runs-on: ubuntu-latest

    steps:
      - name: Extract PR number from issue title
        id: parse
        run: |
          TITLE="${{ github.event.issue.title }}"
          PR_NUMBER=$(echo "$TITLE" | grep -oP '(?<=PR #)\d+' | head -1)
          if [[ -z "$PR_NUMBER" ]]; then
            echo "ERROR: Could not extract PR number from: $TITLE"
            exit 1
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Check PR is open
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ steps.parse.outputs.pr_number }} \
            --jq '{state, draft, head_ref: .head.ref}')
          STATE=$(echo "$PR_DATA" | jq -r '.state')
          HEAD_REF=$(echo "$PR_DATA" | jq -r '.head_ref')
          if [[ "$STATE" != "open" ]]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
              --method POST \
              --field body="❌ Cannot merge: PR #${{ steps.parse.outputs.pr_number }} is not open (state: $STATE)."
            exit 1
          fi
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - name: Deletion guard — block PRs that drop tracked files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.parse.outputs.pr_number }}
          STATS=$(gh api repos/${{ github.repository }}/pulls/$PR --jq '{deletions, additions, mergeable_state, base_sha: .base.sha, head_sha: .head.sha}')
          DEL=$(echo "$STATS"  | jq -r '.deletions')
          ADD=$(echo "$STATS"  | jq -r '.additions')
          MS=$(echo "$STATS"   | jq -r '.mergeable_state')
          # Hard fail on >500 net deletions (mass-deletion guardrail)
          if [ "$DEL" -gt $((ADD + 500)) ]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
              --method POST \
              --field body="❌ **Refused merge.** PR #$PR has $DEL deletions vs $ADD additions (net delta: $((ADD - DEL))). This exceeds the mass-deletion guardrail (500 lines). Manual review required — comment \`/force-merge\` after auditing the diff if intentional."
            exit 1
          fi
          # Block PRs whose base is behind main (forces rebase)
          if [ "$MS" = "behind" ] || [ "$MS" = "dirty" ]; then
            gh api repos/${{ github.repository }}/pulls/$PR/update-branch --method PUT 2>/dev/null || true
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
              --method POST \
              --field body="⚠️ PR base was behind main (\`$MS\`). I've requested an update; please re-run \`/approve-design\` after CI passes."
            exit 1
          fi
          # Block PRs that delete files in protected paths without compensating additions
          PROTECTED_FILES=$(gh api repos/${{ github.repository }}/pulls/$PR/files --paginate \
            --jq '.[] | select(.status=="removed") | select(.filename | test("^(design-proposal/|app/|gateway/|db/migrations/|flows/|infra/|.github/)")) | .filename' | wc -l)
          if [ "$PROTECTED_FILES" -gt 0 ]; then
            FILE_LIST=$(gh api repos/${{ github.repository }}/pulls/$PR/files --paginate \
              --jq '.[] | select(.status=="removed") | select(.filename | test("^(design-proposal/|app/|gateway/|db/migrations/|flows/|infra/|.github/)")) | "  - " + .filename' | head -20)
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
              --method POST \
              --field body=$'❌ **Refused merge.** PR #'"$PR"' removes '"$PROTECTED_FILES"' file(s) from protected paths:\n\n'"$FILE_LIST"'\n\nProtected paths: `design-proposal/`, `app/`, `gateway/`, `db/migrations/`, `flows/`, `infra/`, `.github/`. If intentional, audit the diff and reply with `/force-merge`.'
            exit 1
          fi
          echo "✅ Deletion guard passed (deletions=$DEL, additions=$ADD, mergeable_state=$MS)"

      - name: Squash merge frontend PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE=$(gh api repos/${{ github.repository }}/pulls/${{ steps.parse.outputs.pr_number }} \
            --jq '.title')
          gh api repos/${{ github.repository }}/pulls/${{ steps.parse.outputs.pr_number }}/merge \
            --method PUT \
            --field merge_method=squash \
            --field commit_title="${PR_TITLE} [DesignQA approved]" \
            --field commit_message="Closes #${{ github.event.issue.number }}"

      - name: Delete frontend branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_REF="${{ steps.check_pr.outputs.head_ref }}"
          gh api repos/${{ github.repository }}/git/refs/heads/${HEAD_REF} \
            --method DELETE && echo "Deleted branch: $HEAD_REF" || echo "Branch already deleted"

      - name: Post confirmation and close [DesignQA] issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MERGE_SHA=$(gh api repos/${{ github.repository }}/commits/main --jq '.sha' | cut -c1-7)
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            --method POST \
            --field body="✅ **Design approved.** PR #${{ steps.parse.outputs.pr_number }} squash-merged to main (\`${MERGE_SHA}\`). Frontend branch deleted. The backend wiring PR can now be merged once code QA passes."
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }} \
            --method PATCH --field state=closed

  # ────────────────────────────────────────────────────────────────
  # Backend gate: /approve-merge on a [QA] issue
  # Requires: any linked [DesignQA] issue must already be closed
  # ────────────────────────────────────────────────────────────────
  approve-merge:
    if: |
      contains(github.event.comment.body, '/approve-merge') &&
      startsWith(github.event.issue.title, '[QA]') &&
      github.event.issue.state == 'open' &&
      github.event.comment.user.login == 'edupazogle'
    runs-on: ubuntu-latest

    steps:
      - name: Extract PR number from issue title
        id: parse
        run: |
          TITLE="${{ github.event.issue.title }}"
          PR_NUMBER=$(echo "$TITLE" | grep -oP '(?<=PR #)\d+' | head -1)
          if [[ -z "$PR_NUMBER" ]]; then
            echo "ERROR: Could not extract PR number from: $TITLE"
            exit 1
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Check linked [DesignQA] issue is closed (frontend gate)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if echo "$ISSUE_BODY" | grep -q "DesignQA"; then
            DESIGNQA_NUM=$(echo "$ISSUE_BODY" | grep -oP '(?<=issue #)\d+' | head -1)
            if [[ -n "$DESIGNQA_NUM" ]]; then
              DESIGNQA_STATE=$(gh api repos/${{ github.repository }}/issues/$DESIGNQA_NUM \
                --jq '.state' 2>/dev/null || echo "unknown")
              if [[ "$DESIGNQA_STATE" != "closed" ]]; then
                gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
                  --method POST \
                  --field body="⛔ **Merge blocked.** DesignQA issue #${DESIGNQA_NUM} is still open (state: \`${DESIGNQA_STATE}\`). The frontend design must be approved first. Reply \`/approve-design\` on the DesignQA issue, then retry \`/approve-merge\` here."
                exit 1
              fi
              echo "✅ DesignQA #${DESIGNQA_NUM} is closed — gate passed"
            fi
          fi

      - name: Check PR is open and mergeable
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ steps.parse.outputs.pr_number }} \
            --jq '{state, draft, head_ref: .head.ref}')
          STATE=$(echo "$PR_DATA" | jq -r '.state')
          DRAFT=$(echo "$PR_DATA" | jq -r '.draft')
          HEAD_REF=$(echo "$PR_DATA" | jq -r '.head_ref')
          if [[ "$STATE" != "open" ]]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
              --method POST \
              --field body="❌ Cannot merge: PR #${{ steps.parse.outputs.pr_number }} is not open (state: $STATE)."
            exit 1
          fi
          if [[ "$DRAFT" == "true" ]]; then
            gh api repos/${{ github.repository }}/pulls/${{ steps.parse.outputs.pr_number }} \
              --method PATCH --field draft=false
          fi
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - name: Deletion guard — block PRs that drop tracked files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.parse.outputs.pr_number }}
          STATS=$(gh api repos/${{ github.repository }}/pulls/$PR --jq '{deletions, additions, mergeable_state}')
          DEL=$(echo "$STATS"  | jq -r '.deletions')
          ADD=$(echo "$STATS"  | jq -r '.additions')
          MS=$(echo "$STATS"   | jq -r '.mergeable_state')
          if [ "$DEL" -gt $((ADD + 500)) ]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
              --method POST \
              --field body="❌ **Refused merge.** PR #$PR has $DEL deletions vs $ADD additions. Mass-deletion guardrail tripped — manual review required."
            exit 1
          fi
          if [ "$MS" = "behind" ] || [ "$MS" = "dirty" ]; then
            gh api repos/${{ github.repository }}/pulls/$PR/update-branch --method PUT 2>/dev/null || true
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
              --method POST \
              --field body="⚠️ PR base was behind main (\`$MS\`). I've requested an update; re-run \`/approve-merge\` after CI passes."
            exit 1
          fi
          PROTECTED_FILES=$(gh api repos/${{ github.repository }}/pulls/$PR/files --paginate \
            --jq '.[] | select(.status=="removed") | select(.filename | test("^(design-proposal/|app/|gateway/|db/migrations/|flows/|infra/|.github/)")) | .filename' | wc -l)
          if [ "$PROTECTED_FILES" -gt 0 ]; then
            FILE_LIST=$(gh api repos/${{ github.repository }}/pulls/$PR/files --paginate \
              --jq '.[] | select(.status=="removed") | select(.filename | test("^(design-proposal/|app/|gateway/|db/migrations/|flows/|infra/|.github/)")) | "  - " + .filename' | head -20)
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
              --method POST \
              --field body=$'❌ **Refused merge.** PR #'"$PR"' removes '"$PROTECTED_FILES"' file(s) from protected paths:\n\n'"$FILE_LIST"'\n\nManual audit required.'
            exit 1
          fi
          echo "✅ Deletion guard passed"

      - name: Squash merge backend PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE=$(gh api repos/${{ github.repository }}/pulls/${{ steps.parse.outputs.pr_number }} \
            --jq '.title')
          gh api repos/${{ github.repository }}/pulls/${{ steps.parse.outputs.pr_number }}/merge \
            --method PUT \
            --field merge_method=squash \
            --field commit_title="${PR_TITLE} [QA approved]" \
            --field commit_message="Closes #${{ github.event.issue.number }}"

      - name: Delete backend branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_REF="${{ steps.check_pr.outputs.head_ref }}"
          gh api repos/${{ github.repository }}/git/refs/heads/${HEAD_REF} \
            --method DELETE && echo "Deleted branch: $HEAD_REF" || echo "Branch already deleted"

      - name: Post confirmation and close [QA] issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MERGE_SHA=$(gh api repos/${{ github.repository }}/commits/main --jq '.sha' | cut -c1-7)
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            --method POST \
            --field body="✅ **Merged.** PR #${{ steps.parse.outputs.pr_number }} squash-merged to main (\`${MERGE_SHA}\`). Branch deleted. Sprint delivery complete."
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }} \
            --method PATCH --field state=closed

  # ────────────────────────────────────────────────────────────────
  # Request changes (both issue types)
  # ────────────────────────────────────────────────────────────────
  request-changes:
    if: |
      (contains(github.event.comment.body, '/request-changes') ||
       contains(github.event.comment.body, '/request-design-changes')) &&
      (startsWith(github.event.issue.title, '[QA]') ||
       startsWith(github.event.issue.title, '[DesignQA]')) &&
      github.event.issue.state == 'open'
    runs-on: ubuntu-latest

    steps:
      - name: Post block comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_TYPE="QA"
          if echo "${{ github.event.issue.title }}" | grep -q '\[DesignQA\]'; then
            ISSUE_TYPE="DesignQA"
          fi
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            --method POST \
            --field body="🔴 **Changes requested.** This ${ISSUE_TYPE} issue is being kept open. Address the blocking items above and re-request review."
