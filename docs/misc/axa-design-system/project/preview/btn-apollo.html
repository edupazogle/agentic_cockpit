<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Buttons: Apollo (B2C Prospect)</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:18px; font-family: var(--font-sans); background:#fff; }
  .grp { display:flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; align-items: center; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--gray-500); width: 70px; }
  .btn { font: 700 16px var(--font-sans); padding: 12px 24px; border-radius: 100vmax; border: 0; cursor: pointer;
         transition: all .2s linear; }
  .pri { background: var(--axa-blue); color:#fff; }
  .pri:hover { background:#000072; }
  .biz { background: #BC4C2D; color:#fff; }
  .sec { background: #fff; color: var(--axa-blue); box-shadow: inset 0 0 0 1px var(--axa-blue); }
  .ter { background: #E8E7F7; color: var(--axa-blue); }
  .ghost { background: transparent; color: var(--axa-blue); padding: 8px 0; text-decoration: underline; font-weight: 600; }
  .dis { background: #F6F6F6; color: #999; cursor: not-allowed; }
</style></head>
<body>
  <div class="grp"><span class="lbl">Primary</span><button class="btn pri">Demander un devis</button><button class="btn pri">Souscrire</button></div>
  <div class="grp"><span class="lbl">Business</span><button class="btn biz">Espace Pro</button></div>
  <div class="grp"><span class="lbl">Secondary</span><button class="btn sec">En savoir plus</button><button class="btn ter">Découvrir</button></div>
  <div class="grp"><span class="lbl">Ghost / Disabled</span><button class="ghost">Voir tous nos contrats</button><button class="btn dis" disabled>Indisponible</button></div>
</body></html>
