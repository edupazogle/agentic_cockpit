<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Color: Brand</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 16px; font-family: var(--font-sans); background: #fff; }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1.2/1; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; justify-content: space-between;
        font-size: 11px; line-height: 1.3; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); }
  .sw .name { font-weight: 700; }
  .sw .hex { font-family: var(--font-mono); opacity: 0.85; font-size: 10px; }
  .lt { color: #fff; } .dk { color: var(--gray-1000); }
</style></head>
<body>
  <div class="row">
    <div class="sw lt" style="background:#F8F8FF"><span class="name dk">Blue tint</span><span class="hex dk">#F8F8FF</span></div>
    <div class="sw dk" style="background:#EEEEFF"><span class="name">Blue 30</span><span class="hex">#EEEEFF</span></div>
    <div class="sw dk" style="background:#E4E4FF"><span class="name">Blue 40</span><span class="hex">#E4E4FF</span></div>
    <div class="sw lt" style="background:#5959B6"><span class="name">Blue 650</span><span class="hex">#5959B6</span></div>
    <div class="sw lt" style="background:#3333A5"><span class="name">Blue 800</span><span class="hex">#3333A5</span></div>
    <div class="sw lt" style="background:#00008F;outline:2px solid #00008F"><span class="name">AXA Blue ★</span><span class="hex">#00008F</span></div>
    <div class="sw lt" style="background:#000072"><span class="name">Blue dark</span><span class="hex">#000072</span></div>
  </div>
</body></html>
