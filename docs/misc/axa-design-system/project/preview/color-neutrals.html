<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Color: Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:16px; font-family: var(--font-sans); background:#fff; }
  .row { display:grid; grid-template-columns: repeat(7,1fr); gap:8px; }
  .sw { aspect-ratio:1.2/1; border-radius:8px; padding:10px; display:flex; flex-direction:column; justify-content:space-between;
        font-size:11px; line-height:1.3; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); }
  .sw .name { font-weight:700; }
  .sw .hex { font-family: var(--font-mono); opacity:0.85; font-size:10px; }
  .lt { color:#fff; } .dk { color: var(--gray-1000); }
</style></head>
<body>
  <div class="row">
    <div class="sw dk" style="background:#FFFFFF"><span class="name">White</span><span class="hex">#FFFFFF</span></div>
    <div class="sw dk" style="background:#F6F6F6"><span class="name">Gray 50</span><span class="hex">#F6F6F6</span></div>
    <div class="sw dk" style="background:#E3E3E3"><span class="name">Gray 140</span><span class="hex">#E3E3E3</span></div>
    <div class="sw dk" style="background:#CCCCCC"><span class="name">Gray 250</span><span class="hex">#CCCCCC</span></div>
    <div class="sw lt" style="background:#999999"><span class="name">Gray 500</span><span class="hex">#999999</span></div>
    <div class="sw lt" style="background:#5C5C5C"><span class="name">Gray 800</span><span class="hex">#5C5C5C</span></div>
    <div class="sw lt" style="background:#333333"><span class="name">Gray 1000</span><span class="hex">#333333</span></div>
  </div>
</body></html>
