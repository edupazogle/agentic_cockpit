<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Color: Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:16px; font-family: var(--font-sans); background:#fff; }
  .row { display:grid; grid-template-columns: repeat(4,1fr); gap:12px; }
  .sw { border-radius:8px; padding:14px 14px 12px; display:flex; flex-direction:column; gap:6px; min-height:96px;
        box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); }
  .sw .lab { font-weight:700; font-size:13px; }
  .sw .hex { font-family: var(--font-mono); font-size:11px; opacity:0.9; }
  .sw .role { font-size:11px; opacity:0.85; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#FAFFFB; color:#0C7D3B; box-shadow: inset 0 0 0 1px #0C7D3B33;">
      <span class="lab">Success</span><span class="hex">#0C7D3B / #FAFFFB</span><span class="role">Validation, confirmations</span>
    </div>
    <div class="sw" style="background:#FFFAFB; color:#C7102E; box-shadow: inset 0 0 0 1px #C7102E33;">
      <span class="lab">Error</span><span class="hex">#C7102E / #FFFAFB</span><span class="role">Form errors, danger CTA</span>
    </div>
    <div class="sw" style="background:#FFF1EF; color:#BC4C2D; box-shadow: inset 0 0 0 1px #BC4C2D33;">
      <span class="lab">Warning / Business</span><span class="hex">#BC4C2D / #FFF1EF</span><span class="role">Pro CTA, warning</span>
    </div>
    <div class="sw" style="background:#F5FBFD; color:#3871B5; box-shadow: inset 0 0 0 1px #3871B533;">
      <span class="lab">Info</span><span class="hex">#3871B5 / #F5FBFD</span><span class="role">Info banner, tip</span>
    </div>
  </div>
</body></html>
