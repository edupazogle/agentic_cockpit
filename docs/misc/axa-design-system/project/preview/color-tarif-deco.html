<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Color: Tarif & Decorative</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:16px; font-family: var(--font-sans); background:#fff; }
  h6 { margin:0 0 8px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color: var(--gray-800); }
  .row { display:grid; grid-template-columns: repeat(5,1fr); gap:8px; margin-bottom:14px; }
  .sw { aspect-ratio:1.4/1; border-radius:8px; padding:8px 10px; display:flex; flex-direction:column; justify-content:space-between;
        font-size:11px; color:#fff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); }
  .sw .hex { font-family: var(--font-mono); font-size:10px; opacity:.9; }
  .sw .n { font-weight:700; }
</style></head>
<body>
  <h6>Apollo Tarif — product tier scale</h6>
  <div class="row">
    <div class="sw" style="background:#5F61AD"><span class="n">Blue Tarif</span><span class="hex">#5F61AD</span></div>
    <div class="sw" style="background:#633A96"><span class="n">Purple Light</span><span class="hex">#633A96</span></div>
    <div class="sw" style="background:#5A3976"><span class="n">Purple</span><span class="hex">#5A3976</span></div>
    <div class="sw" style="background:#41314D"><span class="n">Purple Dark</span><span class="hex">#41314D</span></div>
    <div class="sw" style="background:#155D70"><span class="n">Green Tarif</span><span class="hex">#155D70</span></div>
  </div>
  <h6>Decorative B2C — illustrations & hero accents</h6>
  <div class="row">
    <div class="sw" style="background:#6657F0"><span class="n">Grape</span><span class="hex">#6657F0</span></div>
    <div class="sw" style="background:#88C4E5; color:#1a1a1a"><span class="n">Sky</span><span class="hex">#88C4E5</span></div>
    <div class="sw" style="background:#FFBCD2; color:#1a1a1a"><span class="n">Cotton Candy</span><span class="hex">#FFBCD2</span></div>
    <div class="sw" style="background:#FFFCB8; color:#1a1a1a"><span class="n">Sunshine</span><span class="hex">#FFFCB8</span></div>
    <div class="sw" style="background:#6FB5D2"><span class="n">Teal</span><span class="hex">#6FB5D2</span></div>
  </div>
</body></html>
