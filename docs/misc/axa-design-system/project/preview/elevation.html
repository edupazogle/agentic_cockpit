<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; font-family: var(--font-sans); background:#fafafa; }
  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
  .card { background:#fff; padding: 16px; border-radius: 12px; min-height: 90px; display:flex; flex-direction:column; justify-content:flex-end; }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--axa-blue); font-weight:700; }
  .desc { font-size: 11px; color: var(--gray-500); }
  .s1 { box-shadow: 0 0 9px 0 rgba(0,0,0,.18); }
  .s2 { box-shadow: 0 2px 8px 0 rgba(0,0,128,.15); }
  .s3 { box-shadow: 0 8px 24px -4px rgba(0,0,128,.20); }
</style></head>
<body>
  <div class="row">
    <div class="card s1"><span class="lab">--shadow-card</span><span class="desc">0 0 9px rgba(0,0,0,.18) — Slash card halo</span></div>
    <div class="card s2"><span class="lab">--shadow-soft</span><span class="desc">0 2px 8px rgba(0,0,128,.15) — Apollo lift</span></div>
    <div class="card s3"><span class="lab">--shadow-pop</span><span class="desc">0 8px 24px -4px rgba(0,0,128,.20) — Modal/Popover</span></div>
  </div>
</body></html>
