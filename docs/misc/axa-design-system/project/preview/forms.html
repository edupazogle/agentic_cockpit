<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Forms</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:18px; font-family: var(--font-sans); background:#fff; }
  .row { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  label { display:block; font-size: 13px; font-weight: 600; color: var(--gray-1000); margin-bottom: 6px; }
  .help { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
  .err  { font-size: 12px; color: #C7102E; margin-top: 4px; }
  input { width: 100%; box-sizing: border-box; padding: 10px 14px; font: 16px var(--font-sans); border: 1px solid #999; background:#fff; color: var(--gray-1000); border-radius: 8px; }
  input:focus { outline: 2px solid var(--axa-blue); outline-offset: 0; border-color: var(--axa-blue); }
  .err-input { border-color: #C7102E; color: #C7102E; }
  .ok::after { content: "✓"; color:#0C7D3B; margin-left: 8px; font-weight:700; }
</style></head>
<body>
  <div class="row">
    <div>
      <label for="a">Nom</label>
      <input id="a" type="text" value="Dupont"/>
      <div class="help">Tel qu'inscrit sur votre carte d'identité</div>
    </div>
    <div>
      <label for="b" class="ok">Code postal</label>
      <input id="b" type="text" value="75008"/>
      <div class="help" style="color:#0C7D3B">Adresse vérifiée</div>
    </div>
    <div>
      <label for="c">E-mail</label>
      <input id="c" type="text" value="dupont@" class="err-input"/>
      <div class="err">Adresse e-mail invalide</div>
    </div>
  </div>
</body></html>
