<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<style>
  body { margin:0; padding: 18px; font-family: var(--font-sans); background:#fff; }
  .row { display:grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .ic { display:flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; border: 1px solid var(--gray-140); border-radius: 8px; }
  .ic span.ms { font-family: 'Material Symbols Outlined'; font-size: 28px; color: var(--axa-blue); font-variation-settings: 'wght' 400; font-feature-settings: 'liga'; -webkit-font-feature-settings: 'liga'; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-smoothing: antialiased; }
  .ic small { font-family: var(--font-mono); font-size: 9px; color: var(--gray-500); }
  .note { margin-top: 10px; font-size: 11px; color: var(--gray-500); }
</style></head>
<body>
  <div class="row">
    <div class="ic"><span class="ms">home</span><small>home</small></div>
    <div class="ic"><span class="ms">directions_car</span><small>auto</small></div>
    <div class="ic"><span class="ms">favorite</span><small>santé</small></div>
    <div class="ic"><span class="ms">shield</span><small>protection</small></div>
    <div class="ic"><span class="ms">savings</span><small>épargne</small></div>
    <div class="ic"><span class="ms">description</span><small>contrat</small></div>
    <div class="ic"><span class="ms">support_agent</span><small>conseiller</small></div>
    <div class="ic"><span class="ms">chevron_right</span><small>chevron</small></div>
  </div>
  <p class="note">Material Symbols Outlined · weight 400 · always <code>currentColor</code> via the <code>&lt;Svg&gt;</code> component.</p>
</body></html>
