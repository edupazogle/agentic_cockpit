<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Hero imagery</title>
<style>
  body { margin:0; padding: 0; font-family: 'Source Sans 3', sans-serif; }
  .row { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; }
  .pic { position: relative; height: 150px; background-size: cover; background-position: center; }
  .pic span { position: absolute; bottom: 8px; left: 10px; padding: 3px 8px; background: rgba(0,0,143,.85); color:#fff; font-size: 11px; border-radius: 4px; font-family: ui-monospace, monospace; }
</style></head>
<body>
  <div class="row">
    <div class="pic" style="background-image:url(../assets/hero-prospect.jpg)"><span>Prospect (Apollo)</span></div>
    <div class="pic" style="background-image:url(../assets/hero-client.jpg)"><span>Client (LF)</span></div>
    <div class="pic" style="background-image:url(../assets/hero-distributeur.jpg)"><span>Distributeur (Slash)</span></div>
  </div>
</body></html>
