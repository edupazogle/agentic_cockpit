<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding: 0; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: 1fr 1fr; min-height: 130px; }
  .light, .dark { display:flex; align-items: center; justify-content: center; gap: 18px; padding: 18px; }
  .light { background:#fff; }
  .dark  { background: var(--axa-blue); }
  .light img { height: 56px; }
  .dark  img { height: 56px; filter: brightness(0) invert(1); }
  .meta { position: absolute; font-family: var(--font-mono); font-size: 10px; color: var(--gray-500); padding: 8px; }
  .meta-d { color:#C1C4FF; }
</style></head>
<body>
  <div class="row">
    <div class="light"><span class="meta">on white</span><img src="../assets/axa_logo.svg" alt="AXA"/></div>
    <div class="dark"><span class="meta meta-d">on AXA blue</span><img src="../assets/axa_logo.svg" alt="AXA"/></div>
  </div>
</body></html>
