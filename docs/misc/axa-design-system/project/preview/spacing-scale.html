<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:18px; font-family: var(--font-sans); background:#fff; color: var(--fg-primary); }
  .row { display: grid; grid-template-columns: 60px 80px 1fr; gap: 12px; align-items: center; padding: 4px 0; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--gray-800); }
  .px   { font-family: var(--font-mono); font-size: 11px; color: var(--gray-500); }
  .bar  { height: 14px; background: var(--axa-blue); border-radius: 2px; }
</style></head>
<body>
  <div class="row"><span class="name">--sp-1</span><span class="px">4 px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="name">--sp-2</span><span class="px">8 px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="name">--sp-3</span><span class="px">12 px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="name">--sp-4</span><span class="px">16 px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="name">--sp-5</span><span class="px">24 px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="name">--sp-6</span><span class="px">32 px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="name">--sp-7</span><span class="px">40 px</span><div class="bar" style="width:40px"></div></div>
  <div class="row"><span class="name">--sp-8</span><span class="px">48 px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="name">--sp-9</span><span class="px">64 px</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="name">--sp-10</span><span class="px">80 px</span><div class="bar" style="width:80px"></div></div>
</body></html>
