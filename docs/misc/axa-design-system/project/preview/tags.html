<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Tags / Badges</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:18px; font-family: var(--font-sans); background:#fff; }
  .row { display:flex; flex-wrap: wrap; gap: 10px; }
  .tag { display:inline-flex; align-items:center; gap: 6px; padding: 4px 12px; border-radius: 16px; font-size: 14px; line-height: 20px; color:#fff; }
</style></head>
<body>
  <div class="row">
    <span class="tag" style="background:#00008F">Default</span>
    <span class="tag" style="background:#3871B5">Information</span>
    <span class="tag" style="background:#0C7D3B">Succès</span>
    <span class="tag" style="background:#BC4C2D">Avertissement</span>
    <span class="tag" style="background:#C7102E">Erreur</span>
    <span class="tag" style="background:#333">Sombre</span>
    <span class="tag" style="background:#999">Gris</span>
    <span class="tag" style="background:#5A3976">Tarif</span>
    <span class="tag" style="background:#fff; color: var(--axa-blue); box-shadow: inset 0 0 0 1px var(--axa-blue)">Nouveau</span>
  </div>
</body></html>
