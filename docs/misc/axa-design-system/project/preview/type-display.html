<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Type: Display</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px; font-family: var(--font-sans); background:#fff; color: var(--fg-primary); }
  .stack > * + * { margin-top: 14px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--gray-500); margin-bottom: 2px; }
  .h1-spec { font-family: var(--font-display); font-size: 48px; line-height: 60px; font-weight: 700; color: var(--axa-blue); margin: 0; }
  .h2-spec { font-family: var(--font-serif); font-size: 40px; line-height: 50px; font-weight: 300; color: var(--axa-blue); margin: 0; }
</style></head>
<body>
  <div class="stack">
    <div>
      <div class="meta">H1 · Publico Headline Bold · 48/60</div>
      <p class="h1-spec">Votre vie, sereinement</p>
    </div>
    <div>
      <div class="meta">H2 · Publico Light · 40/50</div>
      <p class="h2-spec">Assurance, épargne, santé.</p>
    </div>
  </div>
</body></html>
