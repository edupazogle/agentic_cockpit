<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>AXA — Type: Families</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:18px; font-family: var(--font-sans); background:#fff; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card { padding: 14px 16px; border: 1px solid var(--gray-140); border-radius: 12px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--gray-500); margin-bottom: 4px; }
  .pub { font-family: var(--font-display); font-weight: 700; font-size: 38px; color: var(--axa-blue); margin: 0 0 4px; line-height: 1.1; }
  .pub-l { font-family: var(--font-display); font-weight: 300; font-size: 22px; margin: 0; color: var(--fg-secondary); }
  .ssp { font-family: var(--font-sans); font-weight: 600; font-size: 22px; margin: 0 0 4px; color: var(--fg-primary); }
  .ssp-r { font-family: var(--font-sans); font-weight: 400; font-size: 16px; margin: 0; color: var(--fg-secondary); }
</style></head>
<body>
  <div class="grid">
    <div class="card">
      <div class="meta">Publico Headline · serif · display</div>
      <p class="pub">Aa Bb Cc 123</p>
      <p class="pub-l">Light · Medium · Bold · Black</p>
    </div>
    <div class="card">
      <div class="meta">Source Sans 3 · sans · UI &amp; body</div>
      <p class="ssp">Aa Bb Cc 123</p>
      <p class="ssp-r">Regular · Semibold · Bold</p>
    </div>
  </div>
</body></html>
