<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<title>AXA Espace Client — LF UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<style>
  body { margin:0; font-family:'Source Sans 3', sans-serif; color:#333; }
  .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr; font-feature-settings: 'liga'; -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased; }
</style>
</head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="LF.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  const App = () => {
    const [active, setActive] = useState("Tableau de bord");
    const [claim, setClaim] = useState(false);
    const { SideNav, TopBar, Dashboard, ClaimModal } = LFUI;
    return (
      <div data-screen-label="Espace Client" style={{ display: "flex", height: "100vh" }}>
        <SideNav active={active} onNav={setActive}/>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          <TopBar user="Marie"/>
          <Dashboard onClaim={() => setClaim(true)}/>
        </div>
        {claim && <ClaimModal onClose={() => setClaim(false)}/>}
      </div>
    );
  };
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body></html>
