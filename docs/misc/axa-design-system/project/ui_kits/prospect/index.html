<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<title>AXA Apollo — Prospect UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<style>
  body { margin: 0; font-family: 'Source Sans 3', sans-serif; color: #333; }
  .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr; font-feature-settings: 'liga'; -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased; }
  .apollo-eyebrow { font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #00008F; }
  .apollo-btn { font: 700 16px 'Source Sans 3', sans-serif; padding: 14px 28px; border-radius: 100vmax; border: 0; cursor: pointer; background: #00008F; color: #fff; transition: background .2s linear; }
  .apollo-btn:hover { background: #000072; }
  .apollo-btn--secondary { background: #fff; color: #00008F; box-shadow: inset 0 0 0 1px #00008F; }
  .apollo-btn--inverse { background: rgba(255,255,255,.15); color: #fff; box-shadow: inset 0 0 0 1px #fff; backdrop-filter: blur(2px); }
  .apollo-btn--inverse:hover { background: rgba(255,255,255,.25); }
  .apollo-card { background: #fff; border-radius: 16px; padding: 24px; outline: 1px solid #E3E3E3; outline-offset: -1px; transition: outline .2s linear, box-shadow .2s linear; position: relative; cursor: pointer; }
  .apollo-card:hover { outline: 2px solid #00008F; box-shadow: 0 8px 24px -4px rgba(0,0,128,.15); }
  .apollo-tag { position: absolute; top: 16px; right: 16px; background: #BC4C2D; color: #fff; padding: 4px 10px; border-radius: 100vmax; font-size: 11px; font-weight: 700; }
</style></head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Apollo.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  const App = () => {
    const [open, setOpen] = useState(false);
    const { Header, Hero, ProductGrid, QuoteFlow, Footer } = ApolloUI;
    return (
      <div data-screen-label="Apollo Home">
        <Header/>
        <Hero onQuote={() => setOpen(true)}/>
        <ProductGrid/>
        <Footer/>
        {open && <QuoteFlow onClose={() => setOpen(false)}/>}
      </div>
    );
  };
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body></html>
